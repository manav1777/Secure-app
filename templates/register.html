{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}

<h2 style="font-size:28px; color:#0b3d91;">Register</h2>

<form method="POST">
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Create Account</button>
</form>

{% if message %}
<div style="
    margin-top:20px;
    padding:12px;
    background:#d1fae5;
    color:#065f46;
    border-radius:8px;
    font-size:16px;
">
    {{ message }}
</div>
{% endif %}

<div style="margin-top:20px;">
    <a href="/">
        <button style="background:#334155;">
            Back to Main Page
        </button>
    </a>
</div>

{% endblock %}
